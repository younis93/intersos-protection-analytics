name: Release Windows installer

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    env:
      REPOSITORY_NAME: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Resolve release version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          "APP_VERSION=$version" >> $env:GITHUB_ENV
          (Get-Content backend/version.py) -replace 'APP_VERSION = ".*"', "APP_VERSION = `"$version`"" -replace 'YOUR_GITHUB_OWNER/intersos-protection-analytics', '${{ github.repository }}' | Set-Content backend/version.py
      - name: Install dependencies
        run: |
          python -m pip install -r backend/requirements.txt pyinstaller
          npm ci --prefix frontend
          choco install innosetup -y --no-progress
      - name: Test and build
        shell: pwsh
        run: |
          python -m unittest discover backend
          npm run build --prefix frontend
          python -m PyInstaller --noconfirm --clean --onedir --name "INTERSOS Protection Analytics" --icon intersos-protection-analytics.ico --distpath packaging-temp/dist --workpath packaging-temp/work --specpath packaging-temp/spec --add-data "frontend/dist;frontend/dist" --collect-all polars --collect-all pyarrow --collect-all pandas --collect-all openpyxl desktop_launcher.py
      - name: Sign application and build signed installer
        shell: pwsh
        env:
          SIGNING_CERTIFICATE_BASE64: ${{ secrets.SIGNING_CERTIFICATE_BASE64 }}
          SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
        run: |
          if (-not $env:SIGNING_CERTIFICATE_BASE64 -or -not $env:SIGNING_CERTIFICATE_PASSWORD) { throw "Official releases require signing secrets." }
          [IO.File]::WriteAllBytes("certificate.pfx", [Convert]::FromBase64String($env:SIGNING_CERTIFICATE_BASE64))
          $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Filter signtool.exe -Recurse | Sort-Object FullName -Descending | Select-Object -First 1).FullName
          & $signtool sign /fd SHA256 /td SHA256 /tr http://timestamp.digicert.com /f certificate.pfx /p $env:SIGNING_CERTIFICATE_PASSWORD "packaging-temp/dist/INTERSOS Protection Analytics/INTERSOS Protection Analytics.exe"
          iscc "/DMyAppVersion=$env:APP_VERSION" "installer/INTERSOS Protection Analytics.iss"
          & $signtool sign /fd SHA256 /td SHA256 /tr http://timestamp.digicert.com /f certificate.pfx /p $env:SIGNING_CERTIFICATE_PASSWORD "release/INTERSOS-Protection-Analytics-Setup-$env:APP_VERSION.exe"
          Remove-Item certificate.pfx -Force
      - name: Generate update manifest
        run: python scripts/generate_update_manifest.py "$env:APP_VERSION" "${{ github.repository }}" "release/INTERSOS-Protection-Analytics-Setup-$env:APP_VERSION.exe" "release/update.json"
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/INTERSOS-Protection-Analytics-Setup-${{ env.APP_VERSION }}.exe
            release/update.json
