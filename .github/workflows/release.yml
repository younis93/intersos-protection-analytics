name: Release Windows installer

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    env:
      REPOSITORY_NAME: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Resolve release version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          "APP_VERSION=$version" >> $env:GITHUB_ENV
          (Get-Content backend/version.py) -replace 'APP_VERSION = ".*"', "APP_VERSION = `"$version`"" -replace 'YOUR_GITHUB_OWNER/intersos-protection-analytics', '${{ github.repository }}' | Set-Content backend/version.py
      - name: Install dependencies
        run: |
          python -m pip install -r backend/requirements.txt pyinstaller
          npm ci --prefix frontend
          choco install innosetup -y --no-progress
      - name: Test and build
        shell: pwsh
        run: |
          python -m unittest discover backend
          npm run build --prefix frontend
          python -m PyInstaller --noconfirm --clean --windowed --onedir --name "INTERSOS Protection Analytics" --icon "$env:GITHUB_WORKSPACE\intersos-protection-analytics.ico" --distpath packaging-temp/dist --workpath packaging-temp/work --specpath packaging-temp/spec --add-data "$env:GITHUB_WORKSPACE\frontend\dist;frontend\dist" --collect-all polars "$env:GITHUB_WORKSPACE\desktop_launcher.py"
      - name: Sign application and build signed installer
        shell: pwsh
        env:
          SIGNING_CERTIFICATE_BASE64: ${{ secrets.SIGNING_CERTIFICATE_BASE64 }}
          SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
        run: |
          if (-not $env:SIGNING_CERTIFICATE_BASE64 -or -not $env:SIGNING_CERTIFICATE_PASSWORD) { throw "Official releases require signing secrets." }
          [IO.File]::WriteAllBytes("certificate.pfx", [Convert]::FromBase64String($env:SIGNING_CERTIFICATE_BASE64))
          $flags = [System.Security.Cryptography.X509Certificates.X509KeyStorageFlags]::EphemeralKeySet
          $pfxCertificate = [System.Security.Cryptography.X509Certificates.X509Certificate2]::new((Resolve-Path "certificate.pfx").Path, $env:SIGNING_CERTIFICATE_PASSWORD, $flags)
          $installerCertificate = [System.Security.Cryptography.X509Certificates.X509Certificate2]::new((Resolve-Path "installer/INTERSOS-Code-Signing.cer").Path)
          $expectedThumbprint = "C4F1B12A3BCCC73BEF903FA3796304CF0E67670D"
          if ($pfxCertificate.Thumbprint -ne $expectedThumbprint) { throw "The PFX signing certificate does not match the approved INTERSOS thumbprint." }
          if ($installerCertificate.Thumbprint -ne $expectedThumbprint) { throw "The installer CER does not match the approved INTERSOS thumbprint." }
          if ($pfxCertificate.Thumbprint -ne $installerCertificate.Thumbprint) { throw "The installer CER and PFX signing certificate do not match." }
          $pfxCertificate.Dispose()
          $installerCertificate.Dispose()
          $webViewBootstrapper = "installer/MicrosoftEdgeWebview2Setup.exe"
          Invoke-WebRequest "https://go.microsoft.com/fwlink/p/?LinkId=2124703" -OutFile $webViewBootstrapper
          $webViewSignature = Get-AuthenticodeSignature -LiteralPath $webViewBootstrapper
          if ($webViewSignature.Status -ne "Valid" -or $webViewSignature.SignerCertificate.Subject -notmatch "Microsoft Corporation") { throw "The Microsoft WebView2 bootstrapper signature is invalid." }
          $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Filter signtool.exe -Recurse | Sort-Object FullName -Descending | Select-Object -First 1).FullName
          & $signtool sign /fd SHA256 /td SHA256 /tr http://timestamp.digicert.com /f certificate.pfx /p $env:SIGNING_CERTIFICATE_PASSWORD "packaging-temp/dist/INTERSOS Protection Analytics/INTERSOS Protection Analytics.exe"
          if ($LASTEXITCODE -ne 0) { throw "Application signing failed." }
          iscc "/DMyAppVersion=$env:APP_VERSION" "installer/INTERSOS Protection Analytics.iss"
          if ($LASTEXITCODE -ne 0) { throw "Installer build failed." }
          & $signtool sign /fd SHA256 /td SHA256 /tr http://timestamp.digicert.com /f certificate.pfx /p $env:SIGNING_CERTIFICATE_PASSWORD "release/INTERSOS-Protection-Analytics-Setup-$env:APP_VERSION.exe"
          if ($LASTEXITCODE -ne 0) { throw "Installer signing failed." }
          Remove-Item certificate.pfx -Force
      - name: Generate update manifest
        run: python scripts/generate_update_manifest.py "$env:APP_VERSION" "${{ github.repository }}" "release/INTERSOS-Protection-Analytics-Setup-$env:APP_VERSION.exe" "release/update.json"
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/INTERSOS-Protection-Analytics-Setup-${{ env.APP_VERSION }}.exe
            release/update.json
